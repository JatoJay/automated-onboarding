steps:
  # Build and push backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/onboarding-backend:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/onboarding-backend:latest', './backend']
    id: 'build-backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/onboarding-backend:$COMMIT_SHA']
    id: 'push-backend'
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/onboarding-backend:latest']
    waitFor: ['push-backend']

  # Build and push frontend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_API_URL=https://onboarding-backend-${_CLOUD_RUN_SUFFIX}.a.run.app'
      - '-t'
      - 'gcr.io/$PROJECT_ID/onboarding-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/onboarding-frontend:latest'
      - './frontend'
    id: 'build-frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/onboarding-frontend:$COMMIT_SHA']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/onboarding-frontend:latest']
    waitFor: ['push-frontend']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'onboarding-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/onboarding-backend:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '4000'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'onboarding-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/onboarding-frontend:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
    id: 'deploy-frontend'
    waitFor: ['push-frontend', 'deploy-backend']

substitutions:
  _REGION: us-central1
  _CLOUD_RUN_SUFFIX: 867058958787.us-central1

images:
  - 'gcr.io/$PROJECT_ID/onboarding-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/onboarding-backend:latest'
  - 'gcr.io/$PROJECT_ID/onboarding-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/onboarding-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
